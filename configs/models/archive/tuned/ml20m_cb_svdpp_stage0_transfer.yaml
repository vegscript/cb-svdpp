metadata:
  status: stage0_transfer
  owner: repo
  purpose: model_profile
  provenance:
    transferred_from: configs/models/selected/ml10m/ml10m_cb_svdpp_stage0_transfer.yaml
    transfer_stage: ml20m_matched_campaign

model:
  name: cb_svdpp
  family: clustering_based_factorization
  scope: paper_inspired

training:
  latent_dim: 64
  epochs: 20
  learning_rate: 0.0075
  lambda_b: 0.025
  lambda_p: 0.025
  lambda_q: 0.025
  lambda_y: 0.025
  lambda_pC: 0.025
  lambda_qC: 0.025
  lambda_yC: 0.025
  init_std: 0.1
  dtype: float32
  implicit_policy: ratings_as_implicit

clustering:
  n_user_clusters: 80
  n_item_clusters: 80
  alpha: 0.10
  algorithm: kmeans
  kmeans_n_init: 10

notes:
  - transferred from the clean ml10m matched-campaign profile
  - not tuned on ml20m
  - intended for the ml20m matched cb_svdpp campaign contract
  - split seeds must be 1,2,3 with model seed 1 before any final comparison claim
  - fit-time comparisons must include cluster induction plus main training
  - peak memory must remain below the documented local guardrail
  - not claimable until all campaign split seeds complete and aggregate cleanly
