metadata:
  status: probe
  owner: repo
  purpose: model_profile
  provenance:
    derived_from: configs/models/archive/tuned/ml1m_cb_svdpp_stage0_probe_e003.yaml
    probe_stage: ml10m_stage0_feasibility

model:
  name: cb_svdpp
  family: clustering_based_factorization
  scope: paper_inspired

training:
  latent_dim: 64
  epochs: 1
  learning_rate: 0.0075
  lambda_b: 0.025
  lambda_p: 0.025
  lambda_q: 0.025
  lambda_y: 0.025
  lambda_pC: 0.025
  lambda_qC: 0.025
  lambda_yC: 0.025
  init_std: 0.1
  dtype: float32
  implicit_policy: ratings_as_implicit

clustering:
  n_user_clusters: 80
  n_item_clusters: 80
  alpha: 0.10
  algorithm: kmeans
  kmeans_n_init: 10

notes:
  - feasibility probe only
  - one epoch to bound local runtime and memory risk on ml10m
  - derived from the ml1m bounded cb_svdpp probe profile
  - fit-time measurements must include cluster induction plus main training
  - not claimable as a benchmark-final profile
