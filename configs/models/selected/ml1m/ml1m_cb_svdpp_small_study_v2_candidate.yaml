metadata:
  status: bakeoff_candidate
  owner: repo
  purpose: model_profile
  provenance:
    derived_from: artifacts/tuning/ml1m_cb_svdpp_small_study_v2/selected/selected_candidate_config.yaml
    selected_candidate_id: cand_0007_7111cfbbc311
    source_study: ml1m_cb_svdpp_small_study_v2

model:
  name: cb_svdpp
  family: clustering_based_factorization
  scope: paper_inspired

training:
  latent_dim: 64
  epochs: 3
  learning_rate: 0.01
  lambda_b: 0.025
  lambda_p: 0.025
  lambda_q: 0.025
  lambda_y: 0.025
  lambda_pC: 0.025
  lambda_qC: 0.025
  lambda_yC: 0.025
  init_std: 0.1
  dtype: float32
  implicit_policy: ratings_as_implicit

clustering:
  n_user_clusters: 80
  n_item_clusters: 80
  alpha: 0.2
  algorithm: kmeans
  kmeans_n_init: 10
  induction:
    latent_dim: 64
    epochs: 3
    learning_rate: 0.0075
    lambda_b: 0.025
    lambda_p: 0.025
    lambda_q: 0.025
    seed: 1
    init_std: 0.1
    dtype: float32
    training_backend: auto

notes:
  - bake-off candidate from the corrected ML1M small cache-aware tuning study v2
  - not final adopted
  - clustering.induction is explicit and stable under target-parameter bake-off
