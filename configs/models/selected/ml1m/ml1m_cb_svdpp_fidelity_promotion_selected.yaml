metadata:
  status: selected
  owner: repo
  purpose: model_profile
  provenance:
    derived_from: configs/models/candidates/ml1m/ml1m_cb_svdpp_fidelity_promotion_p1.yaml
    baseline_config: configs/models/selected/ml1m/ml1m_cb_svdpp_stage0_transfer.yaml
    source_study: ml1m_cb_svdpp_small_study_v2
    source_candidate_id: cand_0007_7111cfbbc311
    promotion_step: ml1m_fidelity_promotion_v1
    selection_basis: validation_rmse_ml1m_benchmark_random_v1

model:
  name: cb_svdpp
  family: clustering_based_factorization
  scope: paper_inspired

training:
  latent_dim: 64
  epochs: 20
  learning_rate: 0.01
  lambda_b: 0.025
  lambda_p: 0.025
  lambda_q: 0.025
  lambda_y: 0.025
  lambda_pC: 0.025
  lambda_qC: 0.025
  lambda_yC: 0.025
  init_std: 0.1
  dtype: float32
  implicit_policy: ratings_as_implicit

clustering:
  n_user_clusters: 80
  n_item_clusters: 80
  alpha: 0.2
  algorithm: kmeans
  kmeans_n_init: 10
  induction:
    latent_dim: 64
    epochs: 20
    learning_rate: 0.0075
    lambda_b: 0.025
    lambda_p: 0.025
    lambda_q: 0.025
    seed: 1
    init_std: 0.1
    dtype: float32
    training_backend: auto

notes:
  - selected from ML1M fidelity promotion v1 after promotion_p1 beat the stage0 transfer baseline on validation RMSE
  - selection uses validation metrics only
  - no test metric was used for selection
  - no claim is made beyond the local ML1M fidelity-promotion decision
