metadata:
  status: diagnostic_mini_study
  owner: repo
  purpose: model_profile
  provenance:
    derived_from: configs/models/selected/ml1m/ml1m_cb_svdpp_stage0_transfer.yaml
    scope: ml1m_cache_aware_tuning_mini_study_v1

model:
  name: cb_svdpp
  family: clustering_based_factorization
  scope: paper_inspired

training:
  latent_dim: 64
  epochs: 3
  learning_rate: 0.0075
  lambda_b: 0.025
  lambda_p: 0.025
  lambda_q: 0.025
  lambda_y: 0.025
  lambda_pC: 0.025
  lambda_qC: 0.025
  lambda_yC: 0.025
  init_std: 0.1
  dtype: float32
  implicit_policy: ratings_as_implicit

clustering:
  n_user_clusters: 80
  n_item_clusters: 80
  alpha: 0.10
  algorithm: kmeans
  kmeans_n_init: 10
  induction:
    latent_dim: 64
    epochs: 3
    learning_rate: 0.0075
    lambda_b: 0.025
    lambda_p: 0.025
    lambda_q: 0.025
    seed: 1
    init_std: 0.1
    dtype: float32
    training_backend: auto

notes:
  - diagnostic mini-study profile only
  - derived from the selected ml1m stage0 transfer profile
  - reduced epochs keep the local ML1M cache-aware mini study bounded
  - not benchmark-final
