metadata:
  status: draft
  owner: repo
  purpose: model_profile

model:
  name: cb_svdpp
  family: clustering_based_factorization
  scope: paper_inspired

training:
  latent_dim: 50
  epochs: 20
  learning_rate: 0.01
  lambda_b: 0.02
  lambda_p: 0.02
  lambda_q: 0.02
  lambda_y: 0.02
  lambda_pC: 0.02
  lambda_qC: 0.02
  lambda_yC: 0.02
  init_std: 0.1
  dtype: float32
  implicit_policy: ratings_as_implicit

clustering:
  n_user_clusters: 100
  n_item_clusters: 100
  alpha: 0.10
  algorithm: kmeans
  kmeans_n_init: 10
  induction:
    latent_dim: 50
    epochs: 20
    learning_rate: 0.01
    lambda_b: 0.02
    lambda_p: 0.02
    lambda_q: 0.02
    seed: 1
    init_std: 0.1
    dtype: float32
    training_backend: auto

notes:
  - draft defaults only
  - v1 cb contract uses train-only biased_mf latent induction
  - r_star is diagnostic_only in v1
