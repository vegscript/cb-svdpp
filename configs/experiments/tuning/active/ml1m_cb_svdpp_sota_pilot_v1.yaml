search_space_version: tuning_search_space_v1

study:
  name: ml1m_cb_svdpp_sota_pilot_v1
  dataset: ml1m
  split_family: benchmark_random_v1
  model: cb_svdpp
  seed: 1

base_model_config: configs/models/selected/ml1m/ml1m_cb_svdpp_fidelity_promotion_selected.yaml

budget:
  max_candidates: 16
  max_parallel: 1
  max_wall_seconds: null

generator:
  type: latin_hypercube
  deterministic_order: true
  seed: 11
  n_candidates: 16

schedule:
  stages:
    - name: stage1_low_fidelity
      max_candidates: 16
      promote_top_k: 4
      overrides:
        training.epochs: 3

    - name: stage2_mid_fidelity
      max_candidates: 4
      promote_top_k: 1
      overrides:
        training.epochs: 10

    - name: stage3_full_fidelity
      max_candidates: 1
      promote_top_k: null
      overrides:
        training.epochs: 20

search_space:
  alpha:
    type: float
    distribution: uniform
    low: 0.08
    high: 0.32
    target_path: clustering.alpha

  learning_rate:
    type: float
    distribution: loguniform
    low: 0.004
    high: 0.02
    target_path: training.learning_rate

  lambda_q:
    type: float
    distribution: loguniform
    low: 0.008
    high: 0.06
    target_path: training.lambda_q

  lambda_p:
    type: float
    distribution: loguniform
    low: 0.008
    high: 0.06
    target_path: training.lambda_p

  lambda_y:
    type: float
    distribution: loguniform
    low: 0.008
    high: 0.06
    target_path: training.lambda_y

  lambda_pC:
    type: float
    distribution: loguniform
    low: 0.008
    high: 0.06
    target_path: training.lambda_pC

  lambda_qC:
    type: float
    distribution: loguniform
    low: 0.008
    high: 0.06
    target_path: training.lambda_qC

  lambda_yC:
    type: float
    distribution: loguniform
    low: 0.008
    high: 0.06
    target_path: training.lambda_yC

artifact_reuse:
  cluster_artifacts:
    reuse_across:
      - alpha
      - learning_rate
      - lambda_p
      - lambda_q
      - lambda_y
      - lambda_pC
      - lambda_qC
      - lambda_yC
      - epochs
    invalidate_on:
      - n_user_clusters
      - n_item_clusters
      - induction_config
      - kmeans_n_init
      - clustering_algorithm
      - dataset
      - split
      - train_fingerprint

objective:
  primary:
    metric: validation_rmse
    direction: minimize
    aggregation: mean
  secondary:
    - metric: validation_mae
      direction: minimize
      aggregation: mean
    - metric: fit_model_seconds
      direction: minimize
      aggregation: mean
  required_guards:
    - cluster_cache_status
    - cluster_total_seconds
