notes:
  - validation-only lower-memory reassessment after the local ml20m guardrail breach
  - two split seeds, model seed 1, no test-set evaluation during selection
  - 8 candidates times 2 split seeds equals 16 validation-only runs
  - every candidate must stay below the local 80 percent RAM guardrail on every run
  - KMeans remains the configured clustering algorithm; no MiniBatchKMeans substitution
  - R_star remains diagnostic-only and is not a tuning objective or coefficient
  - cache controls must be explicit in the execution command and summary
  - selection evidence only; not a final benchmark and not a quality claim
  - any promotion requires a separate clean outer benchmark contract with split seeds 1,2,3
