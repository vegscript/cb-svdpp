metadata:
  status: draft
  owner: repo
  purpose: tuning_experiment

tuning:
  name: ml100k_svdpp_stage1
  dataset_short_name: ml100k
  split_family: paper_faithful_ml100k_inner_v1
  selection_stage: stage1
  objective: validation_rmse_mean
  folds:
    - 1
    - 2
  validation_ratio: 0.1
  inner_seed: 17
  model_seed: 1

base_model_config: configs/models/svdpp.yaml

candidates:
  - candidate_id: baseline_k050_lr0100_reg0020_e020
    overrides:
      training:
        latent_dim: 50
        epochs: 20
        learning_rate: 0.01
        lambda_b: 0.02
        lambda_p: 0.02
        lambda_q: 0.02
        lambda_y: 0.02

  - candidate_id: rank064_lr0075_reg0025_e020
    overrides:
      training:
        latent_dim: 64
        epochs: 20
        learning_rate: 0.0075
        lambda_b: 0.025
        lambda_p: 0.025
        lambda_q: 0.025
        lambda_y: 0.025

  - candidate_id: rank080_lr0050_reg0030_e020
    overrides:
      training:
        latent_dim: 80
        epochs: 20
        learning_rate: 0.005
        lambda_b: 0.03
        lambda_p: 0.03
        lambda_q: 0.03
        lambda_y: 0.03
