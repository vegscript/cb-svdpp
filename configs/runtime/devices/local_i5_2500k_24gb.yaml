metadata:
  status: draft
  owner: repo
  purpose: default_local_device_profile

device_profile:
  name: local_i5_2500k_24gb
  compute_class: local_cpu
  cpu_model: intel_core_i5_2500k
  logical_threads: 4
  physical_cores: 4
  ram_gb: 24
  gpu_enabled: false
  gpu_note: gt_1030_present_but_not_default_hot_path

storage:
  cache_preference: ssd
  archive_preference: hdd

threading:
  omp_num_threads: 4
  blas_threads: 4

precision:
  default_dtype: float32
  reference_dtype: float64
