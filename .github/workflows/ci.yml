name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: python -m mypy --ignore-missing-imports --follow-imports=skip --no-incremental src/recsys_lab/core/config.py src/recsys_lab/utils/paths.py
      - run: pytest
